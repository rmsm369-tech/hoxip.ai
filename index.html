      // ---------- helper: render all messages from messages[] to UI ----------
      function renderAllMessages() {
        chatContainer.innerHTML = '';    // clear

          const bubble = createMessageBubble(msg.role, msg.content);

        const div = document.createElement('div');

      // ---------- save to localStorage (only if private mode OFF) ----------
      function saveToLocalStorage() {
        if (!privateMode) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }
      }

      // ---------- clear localStorage (used when private mode ON or new chat) ----------
      function clearStoredHistory() {
        localStorage.removeItem(STORAGE_KEY);
      }

      // ---------- load from localStorage if privateMode false ----------
      function loadFromLocalStorage() {
        if (!privateMode) {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            try {
              messages = JSON.parse(saved);
            } catch (e) {
              messages = [];
            }
          } else {
            messages = [];
          }
        } else {
          messages = [];

      // ---------- add a new message (both to array and UI) and optionally save ----------
      function addMessage(role, text) {
        messages.push({ role, content: text });
        const bubble = createMessageBubble(role, text);
        chatContainer.appendChild(bubble);
       
        saveToLocalStorage();   // will only save if privateMode == false
      }

      // Replace your fetchAiResponse with this one
let forceTinyLlama = false;        // manual override
let currentSource = 'groq';         // 'groq' or 'tinyllama'

// Update UI based on current source
function updateSourceUI() {
  const indicator = document.getElementById('source-indicator');
  const label = document.getElementById('source-label');
  if (currentSource === 'groq') {
    indicator.className = 'w-2 h-2 rounded-full bg-green-500';
    label.textContent = 'Super-ADV';
  } else {
    indicator.className = 'w-2 h-2 rounded-full bg-yellow-500';
    label.textContent = 'onLSD';
  }
}

// Manual toggle button
document.getElementById('force-tiny').addEventListener('click', () => {
  forceTinyLlama = !forceTinyLlama;
  currentSource = forceTinyLlama ? 'tinyllama' : 'groq';
  updateSourceUI();
  // Optional: show a message that next messages will use the selected source
});

async function fetchAiResponse() {

  // Prepare messages for API (convert 'model' to 'assistant')
 const apiMessages = messages.map(m => ({
    role: m.role === 'model' ? 'assistant' : m.role,
    content: m.content
  }));

  let replyText = null;
  let usedSource = null;

  // Try Groq first (unless manually forced to TinyLlama)
  if (!forceTinyLlama) {
    try {
      const workerUrl = 'https://hoxipai.rmsm369.workers.dev'; // your Cloudflare Worker
      const response = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages })
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || `HTTP ${response.status}`);
      }

      const data = await response.json();
      if (!data.reply) throw new Error('No reply from worker');
      replyText = data.reply;
      usedSource = 'groq';
    } catch (error) {
      console.warn('Groq failed, falling back to TinyLlama:', error);
      // fall through to TinyLlama
    }
  }

  // If Groq failed or was forced off, try TinyLlama (Ollama)
  if (!replyText) {
    try {
      // Assuming Ollama is running locally on default port
      const ollamaUrl = 'http://localhost:11434/api/chat';
      const ollamaPayload = {
        model: 'tinyllama', // or whatever you named it
        messages: apiMessages,
        stream: false
      };

      const response = await fetch(ollamaUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ollamaPayload)
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`Ollama error: ${errorText}`);
      }

      const data = await response.json();
      // Ollama /api/chat returns { message: { role, content } }
      replyText = data.message?.content;
      if (!replyText) throw new Error('Invalid Ollama response');
      usedSource = 'tinyllama';
    } catch (error) {
      console.error('Both Groq and TinyLlama failed:', error);
      throw new Error('AI service unavailable. Check your connection.');
    }
  }

  // Update current source and UI
  currentSource = usedSource;
  updateSourceUI();

  return replyText;
}

      // ---------- send message: user input -> call API -> show response ----------
      async function handleSend() {
        const text = userInput.value.trim();
        if (!text || isWaiting) return;

        // Disable input and button while waiting
        isWaiting = true;
        sendBtn.disabled = true;

        addMessage('user', text);
        userInput.value = '';   // clear input
    
        // Create typing indicator inside an AI‑style bubble via DEEpseEK
const typingBubble = document.createElement('div');
typingBubble.className = 'flex justify-start';

const bubble = document.createElement('div');
bubble.className = 'max-w-[80%] sm:max-w-[70%] rounded-2xl px-4 py-2.5 text-sm shadow-sm bg-white border border-gray-200 text-gray-800 rounded-bl-none';

// Add the animated dots

}

bubble.appendChild(indicator);
typingBubble.appendChild(bubble);
chatContainer.appendChild(typingBubble);
const typing = typingBubble; // keep variable name for later removal
scrollToBottom();



        try {
          // 2. Call Groq AI (messages array now includes the new user message)
          const aiReply = await fetchAiResponse();

          // 3. Add AI message
          typing.remove(); // remove "THINKING..." bubble
          addMessage('model', aiReply);


        } catch (error) {
          console.error('AI error:', error);
          // Show error as a temporary system message (but keep conversation)
          const errorMsg = `⚠️ Error: ${error.message}. ERROR 529: CHECK OUT AFTER A WHILE.`;
          // Add as AI bubble? better as a light red bubble from "system" but we'll use model role with error style
          messages.push({ role: 'model', content: errorMsg });
          const errorBubble = createMessageBubble('model', errorMsg);
          // override background to indicate error
          errorBubble.querySelector('div').classList.remove('bg-white', 'border-gray-200');
          errorBubble.querySelector('div').classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
          chatContainer.appendChild(errorBubble);
           
          scrollToBottom();
          // Do NOT save error to storage (private mode or not, we don't want errors persisted)
          // but we already pushed to messages, so we need to remove it from messages if we don't want it in storage.
          // However, it's okay to keep for current session, but remove from messages before saving?
          // Simpler: remove the error message from messages array after showing, so it's not saved.
          messages.pop(); // remove the error message we just pushed
        } finally {
          // Re-enable
          isWaiting = false;
          sendBtn.disabled = false;
          userInput.disabled = false;
          userInput.focus();
        }
      }

      // ---------- event listeners ----------
      sendBtn.addEventListener('click', handleSend);

      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      newChatBtn.addEventListener('click', () => {
        resetConversation();
      });

      // Private mode toggle: update flag and manage localStorage accordingly
      privateModeCheckbox.addEventListener('change', (e) => {
        privateMode = e.target.checked;

        if (privateMode) {
          // turning ON private mode: erase any stored history
          clearStoredHistory();
          // (current messages remain in UI, but won't be saved later)
        } else {
          // turning OFF private mode: save current messages immediately
          saveToLocalStorage();
        }
      });

      // ---------- initial load ----------
      // Set initial privateMode flag based on checkbox (default unchecked)
      privateMode = privateModeCheckbox.checked;
      if (privateMode) {
        // if checkbox is checked on page load (unlikely but possible), ensure storage empty
        clearStoredHistory();
        messages = [];
        renderAllMessages();
      } else {
        // load from localStorage (if any)
        loadFromLocalStorage();
        // if no messages, maybe add a welcome? but keep minimal – empty is fine.
      }

      // If messages are empty, optionally show a hint? We'll keep it clean – no placeholder.
      // Focus input on start
      userInput.focus();

        warningDiv.appendChild(warnBubble);
        chatContainer.appendChild(warningDiv);
        scrollToBottom();
      }

      updateSourceUI();
    })();
