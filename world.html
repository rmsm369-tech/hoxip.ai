<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World | Hoxip</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #343541; color: #ececf1; }
    .post-card { background-color: #444654; transition: all 0.3s ease; }
    /* Hide scrollbar */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    /* Pulse Animation for New Posts */
    @keyframes pulse-border {
      0% { border-color: rgba(236, 236, 241, 0.1); }
      50% { border-color: rgba(236, 236, 241, 0.5); }
      100% { border-color: rgba(236, 236, 241, 0.1); }
    }
    .new-post { animation: pulse-border 2s infinite; }
  </style>
</head>
<body class="h-screen flex flex-col font-sans antialiased overflow-hidden">

  <header class="flex items-center justify-between p-4 border-b border-gray-600/50 bg-[#343541] z-10 shadow-md">
    <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white transition px-2 py-1 rounded">
      ← Back
    </button>
    <h1 class="text-lg font-bold tracking-widest uppercase text-gray-200">The World</h1>
    <div class="w-10"></div>
  </header>

  <main id="feed-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32 scroll-smooth">
   
    </main>
 <div id="infinite-loader" class="hidden w-full flex justify-center py-6 pb-32" class="hidden w-full flex justify-center py-6 transition-opacity duration-300">
  <svg class="animate-spin h-6 w-6 text-[#10a37f]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>
</div>
<div id="end-of-world" class="hidden w-full text-center py-8 text-xs text-[#9a9bb0] font-medium tracking-widest uppercase">
  The Void Ends Here
</div>
  <footer class="absolute bottom-0 w-full p-4 bg-[#343541] border-t border-gray-600/50">
    <div class="max-w-3xl mx-auto flex items-end gap-2">
      <textarea id="post-input" rows="1" placeholder="Broadcast your thoughts to the void..." 
        class="flex-1 bg-[#444654] border border-gray-600 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400 resize-none overflow-hidden transition-all"></textarea>
      <button id="post-btn" class="bg-gray-200 text-[#343541] p-3 rounded-full hover:bg-white transition font-bold shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
      </button>
    </div>
  </footer>

<script>
    const supa = window.supabase.createClient(
      'https://zlncxweliwhtrumpxvkz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsbmN4d2VsaXdodHJ1bXB4dmt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDAzODYsImV4cCI6MjA4ODYxNjM4Nn0.HDcFEow6ArGVDZZ8Hlj6PDB_JP3OvkYiqW7Y_6kGLWg'
    );

    let currentUser = null;
    let currentUsername = 'Nyx Tesla';

    const feedContainer = document.getElementById('feed-container');
    const postInput = document.getElementById('post-input');
    const postBtn = document.getElementById('post-btn');

    async function init() {
      const { data: { user } } = await supa.auth.getUser();
      if (!user) return window.location.href = 'login.html';
      currentUser = user;

      // UPDATED: Now targeting world_profiles
      let { data: profile } = await supa.from('world_profiles').select('username').eq('id', user.id).single();
     // INSERT THIS BLOCK inside your init() function when profile check fails:
if (!profile) {
      document.getElementById('username-modal').classList.remove('hidden');
      return; // CRITICAL: This 'return' stops the function entirely.
    } 
    
    // No 'else' needed! If the code reaches here, it means they DO have a profile.
    currentUsername = profile.username;
    
    loadPosts();
    subscribeToRealtime();
    }

    async function loadPosts() {
      // UPDATED: Now joining with world_profiles
      const { data: posts, error } = await supa
        .from('world_posts')
        .select(`id, content, likes, created_at, user_id, world_profiles(username),user_id`)
        .order('created_at', { ascending: false })
        .limit(20);
      
      if (!error) {
        feedContainer.innerHTML = '';
        posts.forEach(post => renderPost(post));
      } else {
        console.error("Load Error:", error);
      }
    }

    function renderPost(post, prepend = false) {
      if (document.getElementById(`post-${post.id}`)) return;

      const div = document.createElement('div');
      div.id = `post-${post.id}`;
      
      const hour = new Date(post.created_at).getHours();
      const auraColor = hour < 6 || hour > 20 ? 'border-indigo-500/30' : 'border-orange-400/20';
      
      div.className = `post-card p-4 rounded-xl shadow-md border ${auraColor}`;
      
      const timeString = (() => { const d = new Date(post.created_at); const diff = Math.floor((Date.now() - d) / 60000); return diff < 1 ? 'just now' : diff < 60 ? `${diff}m ago` : diff < 1440 ? `${Math.floor(diff/60)}h ago` : `${Math.floor(diff/1440)}d ago`; })();
      // UPDATED: Now reading from world_profiles
      const username = post.world_profiles?.username || currentUsername;

      div.innerHTML = `
        <div class="flex justify-between items-center mb-2">
          <span class="font-bold text-sm text-gray-300">@${username}</span>
          <div class="relative flex items-center gap-2">
  <span class="text-[10px] text-gray-500">${timeString}</span>
  <button onclick="toggleMenu('${post.id}', event)" class="text-gray-400 hover:text-white px-2">⋮</button>
  <div id="menu-${post.id}" class="hidden absolute right-0 top-6 bg-[#343541] border border-gray-600 rounded flex-col w-24 z-20 overflow-hidden">
    ${post.user_id === currentUser.id ? 
      `<button onclick="editPost('${post.id}', event)" class="text-left px-3 py-2 text-sm hover:bg-[#444654]">Edit</button>
       <button onclick="deletePost('${post.id}', event)" class="text-left px-3 py-2 text-sm hover:bg-[#444654] text-red-400">Delete</button>` 
      : `<button onclick="reportPost(event)" class="text-left px-3 py-2 text-sm hover:bg-[#444654] text-yellow-500">Report</button>`}
  </div>
</div>
        </div>
        <p class="text-sm leading-relaxed mb-4 whitespace-pre-wrap">${post.content}</p>
        <div class="flex items-center justify-between border-t border-gray-600/50 pt-2">
          <button onclick="addEcho('${post.id}', ${post.likes})" class="text-xs text-gray-400 hover:text-white transition flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v8l9-11h-7z" /></svg>
            <span id="echo-count-${post.id}">${post.likes} Echoes</span>
          </button>

          <button onclick="toggleComments('${post.id}', event)" class="text-xs text-gray-400 hover:text-white transition flex items-center gap-1 ml-4">
  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
  Discuss
</button>

<div id="comments-section-${post.id}" class="hidden mt-3 pt-3 border-t border-gray-600/30 flex-col gap-2 cursor-default" onclick="event.stopPropagation()">
  <div id="comment-list-${post.id}" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
  <div class="flex gap-2 mt-1">
    <input type="text" id="comment-input-${post.id}" placeholder="Add to the signal..." class="flex-1 bg-[#343541] border border-gray-600 rounded px-3 py-1.5 text-xs text-white focus:outline-none focus:border-gray-400">
    <button onclick="postComment('${post.id}', event)" class="text-xs bg-gray-200 text-[#343541] px-3 rounded font-bold hover:bg-white transition">Send</button>
  </div>
</div>

        </div>
      `;

      div.onclick = (e) => {
        if(e.target.closest('button')) return;
        document.querySelectorAll('.post-card').forEach(n => n.style.opacity = n === div ? '1' : (n.style.opacity == '0.2' ? '1' : '0.2'));
      };

      if (prepend) feedContainer.prepend(div);
      else feedContainer.appendChild(div);
    }

    postBtn.onclick = async () => {
      const content = postInput.value.trim();
      if (!content) return;

      postInput.value = '';
      postInput.style.height = 'auto';
      
      // UPDATED: Join with world_profiles on insert
      const { data: newPost, error } = await supa
        .from('world_posts')
        .insert([{ user_id: currentUser.id, content: content, likes: 0 }])
        .select('*, world_profiles(username)')
        .single();

      if (!error && newPost) {
        console.log('Post saved!', newPost.id);
        renderPost(newPost, true);
        window.scrollTo(0, 0);

        setTimeout(async () => {
          const ghostEchoes = Math.floor(Math.random() * 3) + 1;
          await supa.from('world_posts').update({ likes: ghostEchoes }).eq('id', newPost.id);
          const el = document.getElementById(`echo-count-${newPost.id}`);
          if(el) el.innerText = `${ghostEchoes} Echoes`;
        }, 2000);
      } else {
        console.error("Post Error:", error);
      }
    };

    window.addEcho = async (postId, currentLikes) => {
      const newLikes = currentLikes + 1;
      const el = document.getElementById(`echo-count-${postId}`);
      if(el) el.innerText = `${newLikes} Echoes`;
      await supa.from('world_posts').update({ likes: newLikes }).eq('id', postId);
    };

    postInput.addEventListener('input', function() { 
      this.style.height = 'auto'; 
      this.style.height = (this.scrollHeight < 150 ? this.scrollHeight : 150) + 'px'; 
    });

    function subscribeToRealtime() {
      supa.channel('public:world_posts')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'world_posts' }, payload => {
          if (payload.new.user_id !== currentUser.id) loadPosts();
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'world_posts' }, payload => {
          const countEl = document.getElementById(`echo-count-${payload.new.id}`);
          if (countEl) countEl.innerText = `${payload.new.likes} Echoes`;
        })
        .subscribe();
    }
    window.toggleMenu = (id, e) => { e.stopPropagation(); document.getElementById(`menu-${id}`).classList.toggle('hidden'); };
window.reportPost = (e) => { e.stopPropagation(); alert('Reported'); document.querySelectorAll('[id^="menu-"]').forEach(m => m.classList.add('hidden')); };
window.deletePost = async (id, e) => { 
  e.stopPropagation(); 
  if(confirm('Delete?')) { await supa.from('world_posts').delete().eq('id', id); document.getElementById(`post-${id}`).remove(); } 
};
window.editPost = (id, e) => { 
  e.stopPropagation(); document.getElementById(`menu-${id}`).classList.add('hidden');
  const textNode = document.querySelector(`#post-${id} p`);
  textNode.contentEditable = true; textNode.focus();
  textNode.onblur = async () => {
    textNode.contentEditable = false;
    let newText = textNode.innerText.trim();
    if (!newText.includes('(edited)')) newText += '\n*(edited)*';
    await supa.from('world_posts').update({ content: newText }).eq('id', id);
    textNode.innerText = newText;
  };
};

window.toggleComments = async (postId, e) => {
  e.stopPropagation();
  const section = document.getElementById(`comments-section-${postId}`);
  section.classList.toggle('hidden');
  section.classList.toggle('flex');
  
  // If opening and empty, fetch comments
  const list = document.getElementById(`comment-list-${postId}`);
  if (!section.classList.contains('hidden') && list.innerHTML === '') {
    const { data: comments } = await supa.from('world_comments')
      .select('id, content, likes, world_profiles(username),user_id')
      .eq('post_id', postId).order('created_at', { ascending: true });
    
    if (comments) comments.forEach(c => renderSingleComment(postId, c));
  }
};

window.renderSingleComment = (postId, c) => {
  const list = document.getElementById(`comment-list-${postId}`);
  const username = c.world_profiles?.username || 'Unknown';
  list.insertAdjacentHTML('beforeend', `
    <div id="comment-${c.id}" class="text-xs bg-[#343541] p-2 rounded relative group">
      <span class="font-bold text-gray-300">@${username}</span>
       <span id="comment-text-${c.id}" class="text-gray-200 outline-none rounded focus:bg-[#444654] px-1">${c.content}</span>
      <div class="flex gap-3 text-[9px] text-gray-500 mt-1 uppercase font-bold tracking-wider">
        <button onclick="echoComment('${c.id}', ${c.likes}, event)" class="hover:text-white transition">${c.likes} Echoes</button>
        <button onclick="replyComment('${postId}', '${username}', event)" class="hover:text-white transition">Reply</button>
        ${c.user_id === currentUser.id ? `<button onclick="editComment('${c.id}', event)" class="hover:text-blue-400 transition ml-auto">Edit</button><button onclick="deleteComment('${c.id}', event)" class="hover:text-red-400 transition ml-2 text-red-500/70">Delete</button>` : ''}
      </div>
    </div>
  `);
};

window.postComment = async (postId, e) => {
  e.stopPropagation();
  const input = document.getElementById(`comment-input-${postId}`);
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const { data: newComment } = await supa.from('world_comments')
    .insert([{ post_id: postId, user_id: currentUser.id, content: text, likes: 0 }])
    .select('id, content, likes, world_profiles(username)').single();
  
  if (newComment) {
    renderSingleComment(postId, newComment);
    const list = document.getElementById(`comment-list-${postId}`);
    list.scrollTop = list.scrollHeight; // Auto-scroll to new comment
  }
};

window.echoComment = async (commentId, currentLikes, e) => {
  e.stopPropagation();
  const newLikes = currentLikes + 1;
  e.target.innerText = `${newLikes} Echoes`;
  await supa.from('world_comments').update({ likes: newLikes }).eq('id', commentId);
};

window.replyComment = (postId, username, e) => {
  e.stopPropagation();
  const input = document.getElementById(`comment-input-${postId}`);
  input.value = `@${username} `;
  input.focus();
};
window.deleteComment = async (commentId, e) => {
  e.stopPropagation();
  if (confirm('Erase this echo?')) {
    await supa.from('world_comments').delete().eq('id', commentId);
    document.getElementById(`comment-${commentId}`).remove();
  }
};
window.editComment = (id, e) => {
  e.stopPropagation();
  const textNode = document.getElementById(`comment-text-${id}`);
  textNode.contentEditable = true; textNode.focus();
  textNode.onblur = async () => {
    textNode.contentEditable = false;
    let newText = textNode.innerText.trim();
    if (!newText.includes('(edited)')) newText += ' *(edited)*';
    await supa.from('world_comments').update({ content: newText }).eq('id', id);
    textNode.innerText = newText;
  };
};
// ADDITION: USERNAME VALIDATION AND CLAIM LOGIC
window.claimUsername = async () => {
  const input = document.getElementById('new-username');
  const errorMsg = document.getElementById('username-error');
  
  // 1. Strict Sanitization (Kills XSS and spaces)
  let rawName = input.value;
  let safeName = rawName.replace(/[^a-zA-Z0-9_]/g, '').slice(0, 20);
  input.value = safeName; // Updates UI so user sees invalid chars vanish
  
  // 2. Length & Profanity/Reserved check
  const bannedNames = ['admin', 'hoxip', 'root', 'system', 'mod'];
  if (safeName.length < 3) {
    errorMsg.innerText = "Must be 3-20 characters.";
    errorMsg.classList.remove('hidden');
    return;
  }
  if (bannedNames.some(banned => safeName.toLowerCase().includes(banned))) {
    errorMsg.innerText = "That name is reserved or invalid.";
    errorMsg.classList.remove('hidden');
    return;
  }
  
  // 3. The Database Insert (Let the SQL UNIQUE constraint do the heavy lifting)
  const { error } = await supa.from('world_profiles').insert([{ id: currentUser.id, username: safeName }]);
  
  if (error) {
    // If SQL catches a duplicate, it throws an error here
    errorMsg.innerText = "Name is already taken. Try another.";
    errorMsg.classList.remove('hidden');
    return;
  }
  
  // 4. Success: Hide modal, save locally, and manually trigger the feed
  currentUsername = safeName;
  document.getElementById('username-modal').classList.add('hidden');
  loadPosts();
  subscribeToRealtime();
};

let scrollOffset = 20;
let isFetchingFeed = false;
let hasMoreFeed = true;

async function fetchNextBatch() {
  if (isFetchingFeed || !hasMoreFeed) return;
  
  isFetchingFeed = true;
  const loader = document.getElementById('infinite-loader');
  loader.classList.remove('hidden');

  const { data: nextPosts, error } = await supa
    .from('world_posts')
    .select(`id, content, likes, created_at, user_id, world_profiles(username)`)
    .order('created_at', { ascending: false })
    .range(scrollOffset, scrollOffset + 19);

  if (error || !nextPosts || nextPosts.length === 0) {
    hasMoreFeed = false;
    loader.classList.add('hidden');
    document.getElementById('end-of-world').classList.remove('hidden');
    isFetchingFeed = false;
    return;
  }

  nextPosts.forEach(post => renderPost(post));
  scrollOffset += 20;
  
  if (nextPosts.length < 20) {
    hasMoreFeed = false;
    loader.classList.add('hidden');
    document.getElementById('end-of-world').classList.remove('hidden');
  } else {
    loader.classList.add('hidden');
  }
  
  isFetchingFeed = false;
}

const feedObserver = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && hasMoreFeed) fetchNextBatch();
}, { rootMargin: '200px' });

setTimeout(() => {
  const loaderEl = document.getElementById('infinite-loader');
  if (loaderEl) feedObserver.observe(loaderEl);
}, 1500);

    init();
  </script>
  <div id="username-modal" class="hidden fixed inset-0 bg-black/90 z-[999] flex items-center justify-center backdrop-blur-sm">
  <div class="bg-[#343541] border border-gray-600 p-6 rounded-xl shadow-2xl w-80 text-center">
    <h2 class="text-white text-lg font-bold mb-2">Identify Yourself</h2>
    <p class="text-gray-400 text-xs mb-4">Choose a unique name to enter the World. Alphanumeric and underscores only.</p>
    <input type="text" id="new-username" maxlength="20" placeholder="Username..." class="w-full bg-[#444654] border border-gray-500 rounded px-3 py-2 text-white focus:outline-none focus:border-gray-300 mb-2 text-sm">
    <p id="username-error" class="text-red-400 text-xs hidden mb-3"></p>
    <button onclick="claimUsername()" class="w-full bg-gray-200 text-[#343541] font-bold py-2 rounded hover:bg-white transition text-sm">Enter the Void</button>
  </div>
</div>
</body>
</html>
